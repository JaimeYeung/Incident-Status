<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Incident Status Draft — Crawl MVP</title>
  <style>
    :root { --bg: #0f1419; --card: #1a2332; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --border: #30363d; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1.5rem; line-height: 1.5; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .card h2 { font-size: 0.95rem; margin: 0 0 0.5rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    label { display: block; margin-bottom: 0.25rem; color: var(--muted); font-size: 0.9rem; }
    select, button, textarea { font: inherit; color: inherit; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; }
    select { cursor: pointer; margin-right: 0.5rem; }
    button { cursor: pointer; background: var(--accent); color: #fff; border-color: var(--accent); }
    button:hover { opacity: 0.9; }
    button.secondary { background: transparent; color: var(--accent); }
    textarea { width: 100%; min-height: 120px; resize: vertical; }
    .summary-box, .draft-box { white-space: pre-wrap; word-break: break-word; }
    .sources { list-style: none; padding: 0; margin: 0; }
    .sources li { padding: 0.25rem 0; }
    .sources li::before { content: "• "; color: var(--accent); }
    .error { color: #f85149; }
    .hidden { display: none; }
    .row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .draft-field { margin-bottom: 0.75rem; }
    .draft-field label { margin-bottom: 0.2rem; }
    .draft-field input, .draft-field textarea { width: 100%; }
    .draft-field textarea { min-height: 100px; }
  </style>
</head>
<body>
  <h1>Incident Status Draft</h1>
  <p class="sub">Crawl MVP — Load data, generate draft, review and copy. Data from project folder.</p>

  <div class="card">
    <div class="row">
      <label for="update_type">Update type</label>
      <select id="update_type">
        <option value="Resolved" selected>Resolved</option>
        <option value="Investigating">Investigating</option>
        <option value="Identified">Identified</option>
        <option value="Monitoring">Monitoring</option>
      </select>
      <button id="btn_generate">Generate draft</button>
    </div>
    <p id="api_error" class="error hidden"></p>
  </div>

  <div id="result" class="hidden">
    <div class="card">
      <h2>Internal summary</h2>
      <div id="internal_summary" class="summary-box"></div>
    </div>
    <div class="card">
      <h2>Sources used</h2>
      <ul id="sources_used" class="sources"></ul>
    </div>
    <div class="card">
      <h2>Draft (edit if needed, then copy)</h2>
      <div class="draft-field">
        <label for="draft_title">Title</label>
        <input type="text" id="draft_title" />
      </div>
      <div class="draft-field">
        <label for="draft_status">Status</label>
        <input type="text" id="draft_status" />
      </div>
      <div class="draft-field">
        <label for="draft_message">Message</label>
        <textarea id="draft_message"></textarea>
      </div>
      <button id="btn_copy" class="secondary">Copy to clipboard</button>
    </div>
  </div>

  <script>
    const updateType = document.getElementById("update_type");
    const btnGenerate = document.getElementById("btn_generate");
    const btnCopy = document.getElementById("btn_copy");
    const apiError = document.getElementById("api_error");
    const result = document.getElementById("result");
    const internalSummary = document.getElementById("internal_summary");
    const sourcesUsed = document.getElementById("sources_used");
    const draftTitle = document.getElementById("draft_title");
    const draftStatus = document.getElementById("draft_status");
    const draftMessage = document.getElementById("draft_message");

    function showError(msg) {
      apiError.textContent = msg;
      apiError.classList.remove("hidden");
      result.classList.add("hidden");
    }
    function clearError() {
      apiError.classList.add("hidden");
    }

    btnGenerate.addEventListener("click", async () => {
      clearError();
      btnGenerate.disabled = true;
      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ update_type: updateType.value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.error || "Request failed");
        if (data.error && !data.draft) throw new Error(data.error);
        internalSummary.textContent = data.internal_summary || "";
        sourcesUsed.innerHTML = (data.sources_used || []).map(s => `<li>${s}</li>`).join("");
        const d = data.draft || {};
        draftTitle.value = d.title || "";
        draftStatus.value = d.status || "";
        draftMessage.value = d.message || "";
        result.classList.remove("hidden");
      } catch (e) {
        showError(e.message || "Failed to generate draft.");
      } finally {
        btnGenerate.disabled = false;
      }
    });

    btnCopy.addEventListener("click", () => {
      const title = draftTitle.value.trim();
      const status = draftStatus.value.trim();
      const message = draftMessage.value.trim();
      const full = `Title: ${title}\nStatus: ${status}\n\nMessage:\n${message}`;
      navigator.clipboard.writeText(full).then(() => {
        btnCopy.textContent = "Copied!";
        setTimeout(() => { btnCopy.textContent = "Copy to clipboard"; }, 2000);
      }).catch(() => showError("Copy failed."));
    });
  </script>
</body>
</html>
